services:
  db:
    image: postgres:16-alpine
    container_name: campusmadi-backend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: project_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d project_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusmadi-backend-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: project_db
      SECRET_KEY: very-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 5
    ports:
      - "8000:8000"
    command: ["sh", "-c", "python init_db.py && python create_test_users.py && uvicorn main:app --host 0.0.0.0 --port 8000"]

volumes:
  postgres_data:
